{% load i18n %}
{% load static %}
<link rel="stylesheet" href="{% static 'assets/css/google-translate.css' %}?v=9" />
<div class="rocb-gt-fab notranslate" id="rocbGtFab">
  <div class="rocb-gt-fab__panel" id="rocbGtPanel" aria-hidden="true">
    <p class="rocb-gt-fab__label" id="rocbGtLabel">{% trans "Choose language" %}</p>
    <div id="google_translate_element"></div>
  </div>
  <button
    type="button"
    class="rocb-gt-fab__btn"
    id="rocbGtToggle"
    aria-expanded="false"
    aria-controls="rocbGtPanel"
    aria-label="{% trans 'Translate page' %}"
    title="{% trans 'Translate' %}"
  >
    <svg class="rocb-gt-fab__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.96 4.57l-1.39 1.39C3.78 11.26 2.87 9.04 2.42 7H4.17c.46 1.55 1.25 2.97 2.28 4.22l-3.07 3.07 1.41 1.41 3.07-3.07c1.25 1.03 2.67 1.82 4.22 2.28v1.75h2v-1.75c2.36-.73 4.59-1.97 6.53-3.71l.03.03 2.51 2.54 1.41-1.41-2.35-2.35c.94-.94 1.78-1.98 2.52-3.11l1.59 1.16c-.84 1.25-1.79 2.42-2.85 3.49l2.35 2.35 1.41-1.41z"/>
    </svg>
  </button>
</div>
<script>
  (function () {
    var GT_LANGS = 'en,ru,az,fr,de,es,it,tr,uk,pl,ro,ka,kk,uz,tg,hy,be,bs,sq,mk,sr,hr,bg,lt,lv,et,fi,sv,no,da,nl,cs,sk,sl,hu,el,he,pt,mt,is,me,md,ky';
    function getGtCombo() {
      return document.querySelector('#google_translate_element .goog-te-combo');
    }

    function polishGtWidget() {
      var mount = document.getElementById('google_translate_element');
      if (!mount) return;
      var combo = mount.querySelector('.goog-te-combo');
      var label = document.getElementById('rocbGtLabel');
      if (combo) {
        if (!combo.id) combo.id = 'rocbGtGoogleCombo';
        if (label) {
          label.style.cursor = 'pointer';
          label.onclick = function () {
            combo.focus();
            combo.click();
          };
        }
      }
      mount.querySelectorAll('.goog-te-gadget img, .goog-te-gadget a, .goog-te-gadget > span').forEach(function (el) {
        el.style.setProperty('display', 'none', 'important');
      });
    }

    function initGoogleTranslate() {
      if (window.__rocbGtInited || !window.google || !window.google.translate) return;
      var mount = document.getElementById('google_translate_element');
      if (!mount) return;
      window.__rocbGtInited = true;
      var pageLang = (document.documentElement.lang || 'en').split('-')[0];
      new google.translate.TranslateElement(
        {
          pageLanguage: pageLang,
          includedLanguages: GT_LANGS,
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        },
        'google_translate_element'
      );
      [0, 300, 1000].forEach(function (ms) {
        setTimeout(function () {
          hideGtTopChrome();
          polishGtWidget();
        }, ms);
      });
    }

    window.googleTranslateElementInit = initGoogleTranslate;

    function loadGtScript() {
      if (document.getElementById('rocb-google-translate-script')) {
        initGoogleTranslate();
        hideGtTopChrome();
        return;
      }
      var s = document.createElement('script');
      s.id = 'rocb-google-translate-script';
      s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
      s.async = true;
      document.body.appendChild(s);
    }

    function isInsideGtFab(el) {
      var fab = document.getElementById('rocbGtFab');
      return fab && fab.contains(el);
    }

    function isGtBannerIframe(el) {
      if (!el || el.tagName !== 'IFRAME') return false;
      if (el.classList.contains('goog-te-banner-frame')) return true;
      if (el.className && String(el.className).indexOf('VIpgJd-') !== -1) return true;
      if (el.id && String(el.id).indexOf('container') !== -1) return true;
      if (el.classList.contains('skiptranslate') && el.getAttribute('src') === '#') return true;
      return false;
    }

    function isGtTopChrome(el) {
      if (!el || isInsideGtFab(el)) return false;
      if (el.tagName === 'IFRAME') return isGtBannerIframe(el);
      if (el.tagName === 'DIV' && el.classList.contains('skiptranslate') && el.parentElement === document.body) {
        return !!el.querySelector(
          'iframe.goog-te-banner-frame, iframe[class*="VIpgJd-"], iframe[id*="container"], iframe.skiptranslate[src="#"]'
        );
      }
      return false;
    }

    function applyGtChromeHide(el) {
      el.style.setProperty('display', 'none', 'important');
      el.style.setProperty('visibility', 'hidden', 'important');
      el.style.setProperty('height', '0', 'important');
      el.style.setProperty('width', '0', 'important');
      el.style.setProperty('overflow', 'hidden', 'important');
    }

    function hideGtTopChrome() {
      document.querySelectorAll('body > div.skiptranslate, body > iframe.skiptranslate, iframe').forEach(function (el) {
        if (!isGtTopChrome(el)) return;
        applyGtChromeHide(el);
      });
      document.body.style.setProperty('top', '0', 'important');
      document.body.style.setProperty('margin-top', '0', 'important');
    }

    function watchGtTopChrome() {
      hideGtTopChrome();
      if (window.__rocbGtChromeObserver) return;
      window.__rocbGtChromeObserver = new MutationObserver(hideGtTopChrome);
      window.__rocbGtChromeObserver.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['style', 'class'],
      });
    }

    function setupFab() {
      var btn = document.getElementById('rocbGtToggle');
      var panel = document.getElementById('rocbGtPanel');
      var fab = document.getElementById('rocbGtFab');
      if (!btn || !panel) return;

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = !fab.classList.contains('is-open');
        fab.classList.toggle('is-open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open) {
          loadGtScript();
          [200, 600, 1200].forEach(function (ms) {
            setTimeout(function () {
              polishGtWidget();
              var combo = getGtCombo();
              if (combo) combo.focus();
            }, ms);
          });
        }
      });

      document.addEventListener('click', function (e) {
        if (!fab.classList.contains('is-open')) return;
        if (fab.contains(e.target)) return;
        fab.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        panel.setAttribute('aria-hidden', 'true');
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && fab.classList.contains('is-open')) {
          fab.classList.remove('is-open');
          btn.setAttribute('aria-expanded', 'false');
          panel.setAttribute('aria-hidden', 'true');
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        setupFab();
        watchGtTopChrome();
      });
    } else {
      setupFab();
      watchGtTopChrome();
    }
  })();
</script>
