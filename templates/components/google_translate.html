{% load i18n %}
{% load static %}
<link rel="stylesheet" href="{% static 'assets/css/google-translate.css' %}?v=11" />
<div class="rocb-gt-fab notranslate" id="rocbGtFab">
  <div class="rocb-gt-fab__panel" id="rocbGtPanel" aria-hidden="true">
    <label class="rocb-gt-fab__label" for="rocbGtLangSelect">{% trans "Choose language" %}</label>
    <select id="rocbGtLangSelect" class="rocb-gt-fab__select" aria-label="{% trans 'Choose language' %}">
      <option value="" disabled selected>{% trans "Choose language" %}…</option>
      <option value="en">English</option>
      <option value="ru">Русский</option>
      <option value="az">Azərbaycan</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="tr">Türkçe</option>
      <option value="uk">Українська</option>
      <option value="pl">Polski</option>
      <option value="ro">Română</option>
      <option value="ka">ქართული</option>
      <option value="kk">Қазақ</option>
      <option value="uz">Oʻzbek</option>
      <option value="tg">Тоҷикӣ</option>
      <option value="hy">Հայերեն</option>
      <option value="be">Беларуская</option>
      <option value="bs">Bosanski</option>
      <option value="sq">Shqip</option>
      <option value="mk">Македонски</option>
      <option value="sr">Српски</option>
      <option value="hr">Hrvatski</option>
      <option value="bg">Български</option>
      <option value="lt">Lietuvių</option>
      <option value="lv">Latviešu</option>
      <option value="et">Eesti</option>
      <option value="fi">Suomi</option>
      <option value="sv">Svenska</option>
      <option value="no">Norsk</option>
      <option value="da">Dansk</option>
      <option value="nl">Nederlands</option>
      <option value="cs">Čeština</option>
      <option value="sk">Slovenčina</option>
      <option value="sl">Slovenščina</option>
      <option value="hu">Magyar</option>
      <option value="el">Ελληνικά</option>
      <option value="he">עברית</option>
      <option value="pt">Português</option>
      <option value="mt">Malti</option>
      <option value="is">Íslenska</option>
      <option value="me">Crnogorski</option>
      <option value="md">Moldovenească</option>
      <option value="ky">Кыргызча</option>
    </select>
    <div id="google_translate_element" class="rocb-gt-fab__gt-sr" aria-hidden="true"></div>
  </div>
  <button
    type="button"
    class="rocb-gt-fab__btn"
    id="rocbGtToggle"
    aria-expanded="false"
    aria-controls="rocbGtPanel"
    aria-label="{% trans 'Translate page' %}"
    title="{% trans 'Translate' %}"
  >
    <svg class="rocb-gt-fab__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.96 4.57l-1.39 1.39C3.78 11.26 2.87 9.04 2.42 7H4.17c.46 1.55 1.25 2.97 2.28 4.22l-3.07 3.07 1.41 1.41 3.07-3.07c1.25 1.03 2.67 1.82 4.22 2.28v1.75h2v-1.75c2.36-.73 4.59-1.97 6.53-3.71l.03.03 2.51 2.54 1.41-1.41-2.35-2.35c.94-.94 1.78-1.98 2.52-3.11l1.59 1.16c-.84 1.25-1.79 2.42-2.85 3.49l2.35 2.35 1.41-1.41z"/>
    </svg>
  </button>
</div>
<script src="{% static 'assets/js/google-translate-fab.js' %}?v=1"></script>
