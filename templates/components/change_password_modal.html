{% load i18n %}
<div
  id="changePasswordModal"
  class="change-password-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="changePasswordModalTitle"
  aria-hidden="true"
  data-url="{% url 'change_password' %}"
  data-msg-success="{% trans 'Password updated successfully.' %}"
  data-msg-generic-error="{% trans 'Could not update password. Please try again.' %}"
  data-label-show="{% trans 'Show password' %}"
  data-label-hide="{% trans 'Hide password' %}"
>
  <div class="change-password-modal__backdrop" data-close-change-password></div>
  <div class="change-password-modal__dialog">
    <button
      type="button"
      class="change-password-modal__close"
      data-close-change-password
      aria-label="{% trans 'Close' %}"
    >
      <i class="fa-regular fa-xmark" aria-hidden="true"></i>
    </button>

    <div class="change-password-modal__header">
      <div class="change-password-modal__icon" aria-hidden="true">
        <i class="fa-regular fa-lock"></i>
      </div>
      <h2 id="changePasswordModalTitle" class="change-password-modal__title">
        {% trans "Change password" %}
      </h2>
      <p class="change-password-modal__subtitle">
        {% trans "Enter your current password and choose a new one." %}
      </p>
    </div>

    <form id="changePasswordForm" class="change-password-modal__form" novalidate>
      {% csrf_token %}

      <div class="change-password-field" data-field="old_password">
        <label class="change-password-field__label" for="cpOldPassword">
          {% trans "Current password" %} <span class="change-password-required">*</span>
        </label>
        <div class="change-password-field__input-wrap">
          <input
            type="password"
            id="cpOldPassword"
            name="old_password"
            class="change-password-input"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="change-password-toggle"
            data-toggle-password="cpOldPassword"
            aria-label="{% trans 'Show password' %}"
          >
            <i class="fa-regular fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <p class="change-password-field__error" role="alert" hidden></p>
      </div>

      <div class="change-password-field" data-field="new_password1">
        <label class="change-password-field__label" for="cpNewPassword">
          {% trans "New password" %} <span class="change-password-required">*</span>
        </label>
        <div class="change-password-field__input-wrap">
          <input
            type="password"
            id="cpNewPassword"
            name="new_password1"
            class="change-password-input"
            autocomplete="new-password"
            required
          />
          <button
            type="button"
            class="change-password-toggle"
            data-toggle-password="cpNewPassword"
            aria-label="{% trans 'Show password' %}"
          >
            <i class="fa-regular fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <p class="change-password-field__error" role="alert" hidden></p>
      </div>

      <div class="change-password-field" data-field="new_password2">
        <label class="change-password-field__label" for="cpConfirmPassword">
          {% trans "Confirm new password" %} <span class="change-password-required">*</span>
        </label>
        <div class="change-password-field__input-wrap">
          <input
            type="password"
            id="cpConfirmPassword"
            name="new_password2"
            class="change-password-input"
            autocomplete="new-password"
            required
          />
          <button
            type="button"
            class="change-password-toggle"
            data-toggle-password="cpConfirmPassword"
            aria-label="{% trans 'Show password' %}"
          >
            <i class="fa-regular fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <p class="change-password-field__error" role="alert" hidden></p>
      </div>

      <p id="changePasswordFormError" class="change-password-form-error" role="alert" hidden></p>

      <div class="change-password-modal__actions">
        <button type="button" class="change-password-btn change-password-btn--ghost" data-close-change-password>
          {% trans "Cancel" %}
        </button>
        <button type="submit" class="change-password-btn change-password-btn--primary" id="changePasswordSubmit">
          <span class="change-password-btn__text">{% trans "Update password" %}</span>
          <span class="change-password-btn__spinner" aria-hidden="true"></span>
        </button>
      </div>
    </form>
  </div>
</div>
