{% load i18n %}
<div
  id="countryModalI18n"
  class="d-none"
  data-label-description="{% trans 'Description' %}"
  data-label-website="{% trans 'Website' %}"
  data-label-entries="{% trans 'Additional entries' %}"
  data-label-label="{% trans 'Label' %}"
  data-label-information="{% trans 'Information' %}"
  data-empty="{% trans 'No information available yet.' %}"
  aria-hidden="true"
></div>

<div class="modal fade country-modal" id="countryViewModal" tabindex="-1" aria-labelledby="countryViewModalLabel" aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 class="modal-title" id="countryViewModalLabel">{% trans "Country details" %}</h2>
          <p class="modal-subtitle" id="countryViewModalSubtitle"></p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans 'Close' %}"></button>
      </div>
      <div class="modal-body" id="countryViewModalBody">
        <div class="country-modal-loading">{% trans "Loading..." %}</div>
      </div>
      <div class="modal-footer">
        <button type="button" id="countryViewEditBtn" class="country-modal-btn country-modal-btn--primary d-none">{% trans "Edit" %}</button>
        <button type="button" class="country-modal-btn country-modal-btn--ghost" data-bs-dismiss="modal">{% trans "Close" %}</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade country-modal" id="countryEditModal" tabindex="-1" aria-labelledby="countryEditModalLabel" aria-hidden="true" data-bs-backdrop="true" data-bs-keyboard="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable country-edit-modal-dialog modal-fullscreen-sm-down">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 class="modal-title" id="countryEditModalLabel">{% trans "Edit country information" %}</h2>
          <p class="modal-subtitle" id="countryEditModalSubtitle" data-default-subtitle="{% trans 'Changes are saved for all visitors.' %}">{% trans "Changes are saved for all visitors." %}</p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans 'Close' %}"></button>
      </div>
      <div class="modal-body" id="countryEditModalBody">
        <div class="country-modal-loading">{% trans "Loading..." %}</div>
      </div>
    </div>
  </div>
</div>
